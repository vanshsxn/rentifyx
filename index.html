    <style>
      /* Prevent layout shift during font load */
      html { -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; text-size-adjust: 100%; }
      body { overscroll-behavior-y: none; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      /* Prevent iOS auto-zoom on input focus (font >= 16px) */
      @media (max-width: 768px) {
        input, select, textarea { font-size: 16px !important; }
      }
      /* Improve touch scrolling */
      * { -webkit-overflow-scrolling: touch; }
      /* iOS safe area defaults */
      :root {
        --safe-top: env(safe-area-inset-top);
        --safe-bottom: env(safe-area-inset-bottom);
        --safe-left: env(safe-area-inset-left);
        --safe-right: env(safe-area-inset-right);
      }
      /* Prevent horizontal scroll on mobile */
      html, body { max-width: 100vw; overflow-x: hidden; }
      /* Pre-paint splash background to avoid white flash */
      #root:empty { min-height: 100vh; background: #ffffff; }
      #root:empty::after {
        content: ""; position: fixed; inset: 0; margin: auto;
        width: 28px; height: 28px; border-radius: 50%;
        border: 2px solid rgba(99,102,241,0.2); border-top-color: #6366F1;
        animation: rx-spin 0.8s linear infinite;
      }
      @keyframes rx-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
